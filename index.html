<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DCA" />
    <meta name="theme-color" content="#F4F5F9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0C0A14" media="(prefers-color-scheme: dark)" />
    <title>DCA Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..900&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Set data-theme before first paint so dark/light is already correct on first render.
      (function () {
        try {
          var stored = localStorage.getItem('dca-theme');
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var mode = stored === 'dark' || stored === 'light' ? stored : 'system';
          var theme = mode === 'dark' || (mode === 'system' && prefersDark) ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.setAttribute('data-theme-mode', mode);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
          document.documentElement.setAttribute('data-theme-mode', 'system');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
