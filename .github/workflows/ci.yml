name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install quote worker dependencies
        run: npm ci --prefix workers/quote

      - name: Install email worker dependencies
        run: npm ci --prefix workers/email-cron

      - name: Financial fixtures
        run: npm run test:finance

      - name: Quote status labels
        run: npm run test:quote-status

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
