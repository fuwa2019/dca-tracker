name = "dca-quote"
main = "src/index.ts"
compatibility_date = "2025-12-01"

# Daily price sync — fires UTC 22:15 weekdays (ET 17:15 EST / 18:15 EDT, ~30 min after close).
[triggers]
crons = ["15 22 * * 1-5"]

# Cache responses across requests (5 min for /api/quote, 1 hour for /api/chart, 1 hour for /api/history).
[[kv_namespaces]]
binding = "QUOTE_CACHE"
id = "2ed3dfa2431d4937be121ffb3883a847"
preview_id = "52cfea8072f048c1a61b51b7727e4171"

# CORS allow-list. `*` matches one DNS label (handles Pages preview hashes like
# https://abc123.dca-tracker.pages.dev). Use https://*.pages.dev sparingly.
[vars]
ALLOWED_ORIGINS = "http://localhost:5173,https://dca-tracker.pages.dev,https://*.dca-tracker.pages.dev,https://*.pages.dev"
