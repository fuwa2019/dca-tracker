name = "dca-quote"
main = "src/index.ts"
compatibility_date = "2025-12-01"

# Daily price sync — fires UTC 22:15 after close and UTC 12:15 as a
# next-morning retry. Daily retries reconcile Friday provisional rows on Saturday.
[triggers]
crons = ["15 22 * * *", "15 12 * * *"]

# Cache responses across requests (1 min for /api/quote, 1 hour for /api/chart, 1 hour for /api/history).
[[kv_namespaces]]
binding = "QUOTE_CACHE"
id = "2ed3dfa2431d4937be121ffb3883a847"
preview_id = "52cfea8072f048c1a61b51b7727e4171"

[[kv_namespaces]]
binding = "SCHWAB_TOKEN_STORE"
id = "ae98dbeb043e47158847bfcff27176c9"

# CORS allow-list. `*` matches one DNS label (handles Pages preview hashes like
# https://abc123.dca-tracker.pages.dev). Use https://*.pages.dev sparingly.
[vars]
ALLOWED_ORIGINS = "http://localhost:5173,https://dca-tracker.pages.dev,https://*.dca-tracker.pages.dev,https://dca-tracker-git.pages.dev,https://*.dca-tracker-git.pages.dev,https://*.pages.dev"
MARKET_DATA_PROVIDER = "schwab"
