name = "dca-quote"
main = "src/index.ts"
compatibility_date = "2025-12-01"

# Cache responses across requests (5 min for /api/quote, 1 hour for /api/chart).
[[kv_namespaces]]
binding = "QUOTE_CACHE"
id = "2ed3dfa2431d4937be121ffb3883a847"
preview_id = "52cfea8072f048c1a61b51b7727e4171"

# Production + preview deploys + local dev. Pages preview subdomains are
# matched by the trailing ".dca-tracker.pages.dev" — keep one entry per pattern.
[vars]
ALLOWED_ORIGINS = "http://localhost:5173,https://dca-tracker.pages.dev"
